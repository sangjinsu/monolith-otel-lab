apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monolith-otel-observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    storage:
      exemplars:
        max_exemplars: 10000

    scrape_configs:
      - job_name: 'monolith-otel-lab-app'
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['app.monolith-otel-app.svc.cluster.local:8080']
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monolith-otel-observability
  labels:
    app.kubernetes.io/name: prometheus
spec:
  type: NodePort
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30090
  selector:
    app.kubernetes.io/name: prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monolith-otel-observability
  labels:
    app.kubernetes.io/name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--web.enable-remote-write-receiver"
            - "--enable-feature=exemplar-storage"
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-data
              mountPath: /prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          emptyDir: {}
