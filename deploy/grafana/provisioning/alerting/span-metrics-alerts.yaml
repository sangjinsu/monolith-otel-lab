apiVersion: 1

groups:
  - orgId: 1
    name: span-metrics-alerts
    folder: Lab Alerts
    interval: 10s
    rules:
      - uid: payment-span-errors
        title: Payment authorization span errors
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 120
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: sum(increase(traces_spanmetrics_calls_total{service="monolith-otel-lab",span_name="payment-client.authorize",status_code="STATUS_CODE_ERROR"}[2m]))
              instant: true
              intervalMs: 1000
              legendFormat: payment authorization span errors
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              refId: C
              type: threshold
        dashboardUid: monolith-otel-lab
        panelId: 7
        noDataState: OK
        execErrState: Error
        for: 10s
        annotations:
          summary: Payment authorization span error detected
          description: A failed payment authorization span was observed in the last 2 minutes.
        labels:
          severity: warning
          signal: trace-spanmetrics
          lab: monolith-otel-lab
